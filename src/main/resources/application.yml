server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    gateway:

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - ${FRONTEND_URL:http://localhost:3000}
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            exposed-headers:
              - Authorization
            allow-credentials: true
            max-age: 3600

      routes:
        - id: brisca-websocket
          uri: http://127.0.0.1:8089
          predicates:
            - Path=/brisca/ws/**
          filters:
            - RewritePath=/brisca/(?<segment>.*), /${segment}

        - id: game-websocket
          uri: http://127.0.0.1:8085
          predicates:
            - Path=/game/ws/**
          filters:
            - RewritePath=/game/(?<segment>.*), /${segment}

        - id: game-api
          uri: http://127.0.0.1:8085
          predicates:
            - Path=/game/api/**
          filters:
            - RewritePath=/game/(?<segment>.*), /${segment}

        # ← NUEVA RUTA
        - id: wallet-service
          uri: http://127.0.0.1:8095
          predicates:
            - Path=/player/**
          filters:
            - JwtCookieFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        - id: lobby
          uri: http://127.0.0.1:8082
          predicates:
            - Path=/api/**
          filters:
            - JwtCookieFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        - id: user-service
          uri: http://127.0.0.1:8084
          predicates:
            - Path=/profile/**
          filters:
            - JwtCookieFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

      httpclient:
        wiretap: false
      httpserver:
        wiretap: false

        

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.aguardientes.azarcafetero: DEBUG
    org.springframework.cloud.gateway: INFO

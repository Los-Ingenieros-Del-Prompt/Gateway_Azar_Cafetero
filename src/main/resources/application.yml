server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    gateway:

      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            exposed-headers:
              - Authorization
            allow-credentials: true
            max-age: 3600

      routes:
        - id: lobby
          uri: ${LOBBY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/**
          filters:
            - JwtCookieFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

      httpclient:
        wiretap: false

      httpserver:
        wiretap: false

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway

  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.aguardientes.azarcafetero: DEBUG
    org.springframework.cloud.gateway: INFO
name: Build & Deploy Gateway

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/azar-gateway:latest

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/azar-gateway:latest
            docker stop azar-gateway || true
            docker rm azar-gateway || true
            docker run -d --name azar-gateway --restart unless-stopped --network host -e JWT_SECRET="${{ secrets.JWT_SECRET }}" -e REDIS_HOST="${{ secrets.REDIS_HOST }}" -e REDIS_PORT="${{ secrets.REDIS_PORT }}" -e REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" ${{ secrets.DOCKERHUB_USERNAME }}/azar-gateway:latest
      
      - name: Agregar ruta /player/ en nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo tee /etc/nginx/conf.d/azar.conf > /dev/null << 'NGINXCONF'
            server {
                server_name azar-cafetero.duckdns.org;

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
                location /auth/ {
                    proxy_pass http://127.0.0.1:8080/auth/;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
                location /api/ {
                    proxy_pass http://127.0.0.1:8080/api/;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
                location /player/balance/live {
                    proxy_pass http://127.0.0.1:8080/player/balance/live;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header Cookie $http_cookie;
                    
                    # Headers necesarios para SSE
                    proxy_set_header Connection '';
                    proxy_http_version 1.1;
                    chunked_transfer_encoding on;
                    proxy_buffering off;
                    proxy_cache off;
                    proxy_read_timeout 3600s;
                }
                location /player/ {
                    proxy_pass http://127.0.0.1:8080/player/;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header Cookie $http_cookie;
                }
                location /api/tables {
                    proxy_pass http://127.0.0.1:8085;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
                location /ws/ {
                    proxy_pass http://127.0.0.1:8085;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
                location ^~ /brisca-ws/ {
                    proxy_pass http://127.0.0.1:8089/ws/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_read_timeout 3600s;
                    proxy_send_timeout 3600s;
                    proxy_connect_timeout 3600s;
                }

                listen 443 ssl;
                ssl_certificate /etc/letsencrypt/live/azar-cafetero.duckdns.org/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/azar-cafetero.duckdns.org/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
            }
            server {
                if ($host = azar-cafetero.duckdns.org) {
                    return 301 https://$host$request_uri;
                }
                listen 80;
                server_name azar-cafetero.duckdns.org;
                return 404;
            }
            NGINXCONF
            sudo nginx -t && sudo systemctl reload nginx
      - name: Ver logs Gateway
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== AUTH_SERVICE_URL ==="
            docker inspect azar-gateway --format='{{range .Config.Env}}{{println .}}{{end}}' | grep AUTH
            docker logs azar-gateway --tail 30      
                    

services:

  api-gateway:
    build: .
    container_name: api-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - azarcafetero-net

  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - azarcafetero-net

networks:
  azarcafetero-net:
    driver: bridge
